name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.4'   # Use a stable version that supports --no-wasm-dry-run
          channel: 'stable'
      - run: flutter pub get
      - name: Build Web
        run: flutter build web --release --no-wasm-dry-run   # Add the flag to suppress warnings
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './build/web'
      - uses: actions/deploy-pages@v4
        id: deployment
