name: Build Flutter Web

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Required for GitHub Pages deployment
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.4'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Create missing manifest.json (to avoid 404)
        run: |
          if [ ! -f "web/manifest.json" ]; then
            echo '{"name":"تطبيق المريض","short_name":"المريض","start_url":".","display":"standalone","theme_color":"#0A6EBD","icons":[{"src":"icons/Icon-192.png","sizes":"192x192","type":"image/png"}]}' > web/manifest.json
          fi

      - name: Build Flutter Web
        run: flutter build web --release --base-href "/Mobile-app/" --web-renderer canvaskit --no-wasm-dry-run

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web
          force_orphan: true
