name: patient_app
description: Patient mobile app for medical platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  flutter_secure_storage: ^9.0.0
  dio: ^5.4.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  file_picker: ^8.0.0+1
  google_fonts: ^6.1.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  web:
    wasm:
      enabled: false   # Disable WASM dry‑run to avoid compatibility issues
