name: patient_app
description: Patient mobile app for medical platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # HTTP client
  dio: ^5.4.0
  dio_cookie_manager: ^3.1.1   # sends the better-auth session cookie automatically
  cookie_jar: ^4.0.8            # stores the session cookie on mobile/desktop

  # UI / utilities
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  file_picker: ^8.0.0+1
  google_fonts: ^6.1.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
